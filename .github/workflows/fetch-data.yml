name: Fetch Garmin Data

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # Allow manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Garmin data
        env:
          GARMINTOKENS: ${{ secrets.GARMINTOKENS }}
        run: python scripts/fetch_garmin.py --days 365 --stats-days 60

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/activities.json public/data/daily_stats.json
          git diff --staged --quiet || git commit -m "chore: update Garmin data $(date -u +%Y-%m-%d)"
          git push
